name: CI — Linux

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential doxygen

      - name: Configure
        run: |
          rm -rf build
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-22
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          CODENAME=$(lsb_release -sc)
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/${CODENAME}/ llvm-toolchain-${CODENAME}-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22 git

      - name: Run formatter and fail on changes
        run: |
          chmod +x ./run-clang-format.sh
          CLANG_FORMAT=clang-format-22 ./run-clang-format.sh
          if [ -n "$(git status --porcelain)" ]; then
            echo "Formatting changes detected. Please run ./run-clang-format.sh locally and commit the changes.";
            git --no-pager diff --no-color;
            exit 1;
          else
            echo "No formatting changes detected.";
          fi
